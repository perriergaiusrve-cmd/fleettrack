<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetTrack ENGINS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;margin:0;background:#f3f4f6;font-size:18px;}
header {background:#14532d;color:white;padding:15px;text-align:center;}
nav {display:flex;gap:10px;padding:10px;}
nav button {flex:1;padding:12px;font-size:16px;border:none;background:#166534;color:white;border-radius:10px;}
nav button.refresh {background:#22c55e;}
.container {padding:15px;}
.card {background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
input, select {width:100%;padding:14px;margin:8px 0;font-size:18px;border-radius:8px;border:1px solid #ccc;}
button.send {background:#22c55e;color:white;padding:16px;font-size:18px;border:none;border-radius:10px;width:100%;}
.kpi {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi div {background:white;padding:15px;border-radius:10px;text-align:center;font-weight:bold;}
.hidden {display:none;}
.urgent {background:#fee2e2;}
</style>
</head>

<body>

<header>
<h2>🏗️ FleetTrack ENGINS</h2>
</header>

<nav>
<button onclick="showPage('dashboard')">📊</button>
<button onclick="showPage('form')">🛠</button>
<button onclick="showPage('history')">📋</button>
<button class="refresh" onclick="loadData()">🔄</button>
</nav>

<div class="container">

<div id="dashboard">
<div class="kpi">
<div id="kpiTotal">0<br>Total</div>
<div id="kpiUrgent">0<br>Urgent</div>
<div id="kpiHeures">0h<br>Heures</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<div id="form" class="hidden">
<div class="card">

<label>Technicien</label>
<select id="mecanicien">
<option>Jean-François ROBERT</option>
<option>Julian PAPOU</option>
<option>Laurent MOREL</option>
<option>Gaïus PERRIER</option>
</select>

<label>Machine</label>
<select id="machine"></select>

<input id="type" readonly>

<input id="panne" placeholder="Panne">
<input id="duree" placeholder="Durée (h)">

<select id="priorite">
<option>Basse</option>
<option>Moyenne</option>
<option>Urgente</option>
</select>

<select id="statut">
<option>En cours</option>
<option>Terminé</option>
</select>

<button class="send" onclick="envoyer()">Envoyer</button>

</div>
</div>

<div id="history" class="hidden">
<div id="historyData"></div>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const URL = "https://script.google.com/macros/s/AKfycbwQrvl8XYeqZOlQK7qV7snTWIM-w69MZ4mX0d8_j9qiPCU5bgcpcfQlcSn5-bIvSAfL/exec";

const machine = document.getElementById("machine");
const type = document.getElementById("type");
const mecanicien = document.getElementById("mecanicien");
const panne = document.getElementById("panne");
const duree = document.getElementById("duree");
const priorite = document.getElementById("priorite");
const statut = document.getElementById("statut");
const historyData = document.getElementById("historyData");
const kpiTotal = document.getElementById("kpiTotal");
const kpiUrgent = document.getElementById("kpiUrgent");
const kpiHeures = document.getElementById("kpiHeures");

window.showPage = function(p){
["dashboard","form","history"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(p).style.display="block";
}

// 🔥 LISTE COMPLETE DES ENGINS
const machines = [
["CHARIOT-19","Chariot élévateur"],
["CHARIOT-20","Chariot élévateur"],
["CHARIOT-21","Chariot élévateur"],
["CHARIOT-22","Chariot élévateur"],
["CHARIOT-23","Chariot élévateur"],
["CHARIOT-24","Chariot élévateur"],
["CHARIOT-25","Chariot élévateur"],
["CHARIOT-26","Chariot élévateur"],
["CHARIOT-27","Chariot élévateur"],
["CHARIOT-28","Chariot élévateur"],
["CHARIOT-TELESCO","Chariot télescopique"],
["KUBOTA-R086","Chargeur"],
["KUBOTA-R090","Chargeur"],
["NACELLE-01","Nacelle"]
];

machines.forEach(m=>{
let opt=document.createElement("option");
opt.value=m[0];
opt.textContent=m[0]+" • "+m[1];
machine.appendChild(opt);
});

machine.addEventListener("change", ()=>{
let m=machines.find(x=>x[0]===machine.value);
if(m){ type.value=m[1]; }
});

machine.selectedIndex = 0;
type.value = machines[0][1];

window.envoyer = function(){

if(!panne.value || !duree.value){
alert("Remplis tous les champs !");
return;
}

fetch(URL+"?action=add"
+"&mecanicien="+encodeURIComponent(mecanicien.value)
+"&machine="+encodeURIComponent(machine.value)
+"&type="+encodeURIComponent(type.value)
+"&panne="+encodeURIComponent(panne.value)
+"&duree="+encodeURIComponent(duree.value)
+"&priorite="+priorite.value
+"&statut="+statut.value)
.then(()=>{
alert("✅ Envoyé !");
panne.value="";
duree.value="";
loadData();
});
}

let chart;

window.loadData = function(){

fetch(URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let total=0, urgent=0, heures=0;
let stats={}, hist="";

for(let i=data.length-1;i>=1;i--){

let mecanicien=data[i][1];
let machineName=data[i][2];
let panneVal=data[i][4];
let dureeVal=Number(data[i][5])||0;
let prioriteVal=data[i][6];
let date=data[i][0];

total++;
if(prioriteVal==="Urgente") urgent++;
heures+=dureeVal;

if(!stats[machineName]) stats[machineName]=0;
stats[machineName]++;

let cls = prioriteVal==="Urgente" ? "card urgent":"card";

hist+=`
<div class="${cls}">
📅 ${date}<br>
🏗️ ${machineName}<br>
👨‍🔧 ${mecanicien}<br>
🔧 ${panneVal}<br>
⏱ ${dureeVal} h
</div>`;
}

historyData.innerHTML=hist;

kpiTotal.innerHTML=total+"<br>Total";
kpiUrgent.innerHTML=urgent+"<br>Urgent";
kpiHeures.innerHTML=heures+"h<br>Heures";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:Object.keys(stats),
datasets:[{
label:"Interventions",
data:Object.values(stats)
}]
}
});

});

}

loadData();

});

</script>

</body>
</html>
