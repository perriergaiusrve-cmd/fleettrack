<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FleetTrack PRO</title>

<style>
body {font-family:Arial;margin:0;background:#f3f4f6;}

header {
background:#0f172a;color:white;
padding:15px;display:flex;justify-content:space-between;
}

nav button {
margin:5px;padding:10px;border:none;
background:#1e293b;color:white;border-radius:5px;
cursor:pointer;
}

.container {padding:20px;}

.card {
background:white;padding:15px;
margin:10px 0;border-radius:10px;
}

.hidden {display:none;}

input,select {
width:100%;padding:8px;margin:5px 0;
}

button.send {
background:green;color:white;padding:10px;width:100%;
}
</style>
</head>

<body>

<header>
<h2>FleetTrack</h2>

<nav>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('form')">Formulaire</button>
<button onclick="showPage('history')">Historique</button>
</nav>
</header>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
<h3>Réparations</h3>
<div id="tableData"></div>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<div class="card">

<select id="mecanicien">
<option>Jean-François ROBERT</option>
<option>Julian PAPOU</option>
<option>Laurent MOREL</option>
</select>

<select id="vehicule"></select>

<input id="marque" placeholder="Marque" readonly>
<input id="type" placeholder="Type" readonly>

<input id="panne" placeholder="Panne">

<input id="duree" placeholder="Durée">

<select id="priorite">
<option>Basse</option>
<option>Moyenne</option>
<option>Urgente</option>
</select>

<select id="statut">
<option>En cours</option>
<option>Terminé</option>
</select>

<button class="send" onclick="envoyer()">Envoyer</button>

</div>

</div>

<!-- HISTORIQUE -->
<div id="history" class="hidden">
<div id="historyData"></div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzVRukMQQ0Avv8H2apxs9qjGt7ZmTAavyTw9f63AMudBqG2X0QywCQk1B5oSUZSZ8f0nQ/exec";

// NAVIGATION
function showPage(p){
document.getElementById("dashboard").style.display="none";
document.getElementById("form").style.display="none";
document.getElementById("history").style.display="none";

document.getElementById(p).style.display="block";
}

// CAMIONS
const camions = [
["GW-963-PN","IVECO","CELLULE"],
["FM-628-NX","RENAULT","CELLULE"],
["FV-833-WC","VOLVO","AMPLIROLL + G"],
["BR-266-AG","SCANIA","TRACTEUR"],
["HB-829-MB","VOLVO","CELLULE"]
];

// remplir liste
camions.forEach(c=>{
let opt=document.createElement("option");
opt.value=c[0];
opt.textContent=c[0];
vehicule.appendChild(opt);
});

// auto infos
vehicule.addEventListener("change", ()=>{
let c=camions.find(x=>x[0]===vehicule.value);
if(c){
marque.value=c[1];
type.value=c[2];
}
});

// ENVOI
function envoyer(){

fetch(URL+"?action=add"
+"&mecanicien="+mecanicien.value
+"&vehicule="+vehicule.value
+"&marque="+marque.value
+"&type="+type.value
+"&panne="+panne.value
+"&duree="+duree.value
+"&priorite="+priorite.value
+"&statut="+statut.value
);

alert("Envoyé !");
loadData();
}

// LOAD
function loadData(){

fetch(URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let html="";

for(let i=1;i<data.length;i++){
html+=data[i][2]+" - "+data[i][5]+"<br>";
}

tableData.innerHTML=html;
historyData.innerHTML=html;

});
}

loadData();

</script>

</body>
</html>
