<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FleetTrack PRO UI</title>

<style>
body {
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#f3f4f6;
}

/* HEADER */
header {
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

header h1 {
margin:0;
color:#ef4444;
}

nav a {
color:white;
margin-left:20px;
text-decoration:none;
padding:8px 12px;
border-radius:8px;
}

nav a.active {
background:#ef4444;
}

/* MAIN */
.container {
padding:30px;
}

.top-bar {
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button.refresh {
background:#111827;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.card {
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* TABLE */
table {
width:100%;
border-collapse:collapse;
}

th {
text-align:left;
color:#6b7280;
font-size:12px;
}

td {
padding:10px 0;
border-top:1px solid #eee;
}

/* BOTTOM */
.grid-bottom {
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>FleetTrack</h1>

<nav>
<a class="active">Tableau de bord</a>
<a>Formulaire mécanicien</a>
<a>Historique</a>
</nav>
</header>

<div class="container">

<div class="top-bar">
<h2>Vue d'ensemble – Parc de camions</h2>
<button class="refresh">⟳ Actualiser</button>
</div>

<p>Chargement...</p>

<div class="grid">

<!-- TABLE -->
<div class="card">
<h3>Réparations récentes</h3>

<table>
<thead>
<tr>
<th>CAMION</th>
<th>TYPE</th>
<th>MÉCANICIEN</th>
<th>PRIORITÉ</th>
<th>STATUT</th>
<th>DATE</th>
</tr>
</thead>

<tbody id="tableData">
<tr>
<td colspan="6">Aucune donnée</td>
</tr>
</tbody>

</table>
</div>

<!-- RIGHT -->
<div>
<div class="card">
<h3>Répartition par statut</h3>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h3>Réparations par marque</h3>
<canvas id="chart2"></canvas>
</div>
</div>

</div>

<div class="grid-bottom">

<div class="card">
<h3>Performance mécaniciens</h3>
<canvas id="chart3"></canvas>
</div>

<div class="card">
<h3>Types de pannes</h3>
<canvas id="chart4"></canvas>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// DEMO DATA (à remplacer par Google Sheets)
const data = [
["GW-963-PN","IVECO","Jean-François","Urgente","En cours","2026-03-20"],
["FM-628-NX","RENAULT","Julian","Moyenne","Terminé","2026-03-19"]
];

// TABLE
let html="";
data.forEach(d=>{
html+=`
<tr>
<td>${d[0]}</td>
<td>${d[1]}</td>
<td>${d[2]}</td>
<td>${d[3]}</td>
<td>${d[4]}</td>
<td>${d[5]}</td>
</tr>`;
});
document.getElementById("tableData").innerHTML=html;

// CHARTS
new Chart(chart1,{
type:'doughnut',
data:{labels:["En cours","Terminé"],datasets:[{data:[1,1]}]}
});

new Chart(chart2,{
type:'bar',
data:{labels:["IVECO","RENAULT"],datasets:[{data:[1,1]}]}
});

new Chart(chart3,{
type:'bar',
data:{labels:["Jean","Julian"],datasets:[{data:[80,100]}]}
});

new Chart(chart4,{
type:'pie',
data:{labels:["Moteur","Frein"],datasets:[{data:[1,1]}]}
});

</script>

</body>
</html>
