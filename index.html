<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FleetTrack PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#f3f4f6;}

header {
background:#0f172a;color:white;
display:flex;justify-content:space-between;
padding:15px 30px;
}

nav a {
color:white;margin-left:15px;
cursor:pointer;padding:8px 12px;
border-radius:8px;
}

nav a.active {background:#ef4444;}

.container {padding:20px;}

.card {
background:white;padding:15px;
border-radius:12px;margin:10px 0;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.grid {display:grid;grid-template-columns:2fr 1fr;gap:20px;}

.hidden {display:none;}

input,select,textarea {
width:100%;padding:8px;margin:5px 0;
border-radius:8px;border:1px solid #ccc;
}

button {
padding:10px;border:none;
border-radius:8px;cursor:pointer;
}

.send {background:#22c55e;color:white;}
.refresh {background:#111827;color:white;}

table {width:100%;border-collapse:collapse;}
td,th {padding:8px;border-bottom:1px solid #eee;}

</style>
</head>

<body>

<header>
<h2>FleetTrack</h2>

<nav>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('form')">Formulaire</a>
<a onclick="showPage('history')">Historique</a>
</nav>
</header>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<div style="display:flex;justify-content:space-between">
<h2>Vue d'ensemble</h2>
<button class="refresh" onclick="loadData()">Actualiser</button>
</div>

<div class="grid">

<div class="card">
<h3>Réparations récentes</h3>
<table>
<thead>
<tr>
<th>Camion</th><th>Mécano</th><th>Panne</th><th>Statut</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<!-- FORM -->
<div id="form" class="hidden">

<div class="card">
<h3>Nouvelle réparation</h3>

<input id="vehicule" placeholder="Plaque camion">
<input id="mecanicien" placeholder="Mécanicien">
<input id="panne" placeholder="Panne">

<select id="priorite">
<option>Basse</option>
<option>Moyenne</option>
<option>Urgente</option>
</select>

<select id="statut">
<option>En cours</option>
<option>Terminé</option>
</select>

<button class="send" onclick="envoyer()">Envoyer</button>

</div>

</div>

<!-- HISTORIQUE -->
<div id="history" class="hidden">

<div class="card">
<h3>Historique complet</h3>
<div id="historyData"></div>
</div>

</div>

</div>

<script>

const URL = "TON_URL_ICI";

// NAVIGATION
function showPage(page){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("form").classList.add("hidden");
document.getElementById("history").classList.add("hidden");

document.getElementById(page).classList.remove("hidden");
}

// ENVOI DATA
function envoyer(){

let url = URL + "?action=add"
+"&mecanicien="+encodeURIComponent(mecanicien.value)
+"&vehicule="+encodeURIComponent(vehicule.value)
+"&marque=NA&type=NA"
+"&panne="+encodeURIComponent(panne.value)
+"&description="
+"&duree="
+"&priorite="+priorite.value
+"&pieces="
+"&cout=0"
+"&statut="+statut.value;

fetch(url)
.then(()=> {
alert("✅ Envoyé !");
loadData();
});

}

// LOAD DATA
function loadData(){

fetch(URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let html="";
let hist="";
let enCours=0, termine=0;

for(let i=1;i<data.length;i++){

html+=`
<tr>
<td>${data[i][2]}</td>
<td>${data[i][1]}</td>
<td>${data[i][5]}</td>
<td>${data[i][11]}</td>
</tr>`;

hist+=`
<div class="card">
${data[i][2]} - ${data[i][1]}<br>
${data[i][5]} (${data[i][8]})
</div>`;

if(data[i][11]=="En cours") enCours++;
if(data[i][11]=="Terminé") termine++;
}

tableData.innerHTML=html;
historyData.innerHTML=hist;

// GRAPH
new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:["En cours","Terminé"],
datasets:[{data:[enCours,termine]}]
}
});

});
}

// INIT
loadData();

</script>

</body>
</html>
