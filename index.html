<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FleetTrack PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:Segoe UI;background:#f3f4f6;}

header {
background:#0f172a;color:white;
display:flex;justify-content:space-between;
padding:15px 30px;
}

nav a {
color:white;margin-left:15px;
cursor:pointer;padding:8px 12px;
border-radius:8px;
}

nav a:hover {background:#ef4444;}

.container {padding:20px;}

.card {
background:white;padding:15px;
border-radius:12px;margin:10px 0;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.grid {display:grid;grid-template-columns:2fr 1fr;gap:20px;}

.hidden {display:none;}

input,select {
width:100%;padding:8px;margin:5px 0;
border-radius:8px;border:1px solid #ccc;
}

button {
padding:10px;border:none;
border-radius:8px;cursor:pointer;
}

.send {background:#22c55e;color:white;}
.refresh {background:#111827;color:white;}

table {width:100%;border-collapse:collapse;}
td,th {padding:8px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<header>
<h2>FleetTrack</h2>

<nav>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('form')">Formulaire</a>
<a onclick="showPage('history')">Historique</a>
</nav>
</header>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<div style="display:flex;justify-content:space-between">
<h2>Vue d'ensemble</h2>
<button class="refresh" onclick="loadData()">Actualiser</button>
</div>

<div class="grid">

<div class="card">
<h3>Réparations récentes</h3>
<table>
<thead>
<tr>
<th>Camion</th><th>Mécano</th><th>Panne</th><th>Statut</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<!-- FORM -->
<div id="form" class="hidden">

<div class="card">
<h3>Nouvelle intervention</h3>

<label>Mécanicien</label>
<select id="mecanicien">
<option>Jean-François ROBERT</option>
<option>Julian PAPOU</option>
<option>Laurent MOREL</option>
</select>

<label>Camion</label>
<select id="vehicule" onchange="remplirInfos()"></select>

<input id="marque" placeholder="Marque" readonly>
<input id="type" placeholder="Type" readonly>

<input id="panne" placeholder="Panne">

<label>Temps (heures)</label>
<input id="duree" type="number">

<select id="priorite">
<option>Basse</option>
<option>Moyenne</option>
<option>Urgente</option>
</select>

<select id="statut">
<option>En cours</option>
<option>Terminé</option>
</select>

<button class="send" onclick="envoyer()">Envoyer</button>

</div>

</div>

<!-- HISTORIQUE -->
<div id="history" class="hidden">

<div class="card">
<h3>Historique complet</h3>
<div id="historyData"></div>
</div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzLbtCxQWnx2LZeS4jZrVgERK30H0QLudhcTufG53gX-k0y1sV6MIszRN88R8e3qOPxbQ/exec";

// NAVIGATION
function showPage(page){
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("form").classList.add("hidden");
document.getElementById("history").classList.add("hidden");
document.getElementById(page).classList.remove("hidden");
}

// CAMIONS
const camions = [
["GW-963-PN","IVECO","CELLULE"],
["FM-628-NX","RENAULT","CELLULE"],
["FM-624-NX","RENAULT","CELLULE"],
["FV-833-WC","VOLVO","AMPLIROLL + G"],
["FY-083-QD","LECITRAILER","SEMI REMORQUE"],
["BR-266-AG","SCANIA","TRACTEUR"],
["CV-181-YK","LECITRAILER","PLATEAUX"],
["GW-647-PG","IVECO","CELLULE"],
["HB-829-MB","VOLVO","CELLULE"],
["CH-220-ZN","SCANIA","TRACTEUR"],
["GM-076-WD","IVECO","CELLULE"],
["HD-459-MY","VOLVO","TRACTEUR"],
["GM-483-YJ","MERCEDES","CELLULE"],
["BJ-752-FJ","SCANIA","AMPLIROLL + G"],
["FB-208-HP","VOLVO","CELLULE"],
["GQ-753-ST","MERCEDES","CELLULE"],
["HF-987-PQ","MERCEDES","TRACTEUR"],
["BF-558-MB","SCANIA","CELLULE"],
["FC-667-SR","VOLVO","TRACTEUR"],
["GZ-123-QP","","SEMI REMORQUE"],
["CT-370-HF","BXL","ROLLTAINER"],
["FC-248-HH","TROUILLET","SEMI REMORQUE"],
["DM-855-YH","SCANIA","TRACTEUR"],
["FB-530-SM","SCHMITZ","SEMI REMORQUE"],
["CT-779-HE","BXL","ROLLTAINER"],
["DV-776-PX","VOLVO","AMPLIROLL"],
["HB-416-VQ","DAF","AMPLIROLL"],
["FC-171-XA","VOLVO","TRACTEUR"],
["HB-807-PM","VOLVO","CELLULE"],
["EV-985-YF","SCANIA","CELLULE"]
];

// REMPLIR SELECT
camions.forEach(c=>{
let opt=document.createElement("option");
opt.value=c[0];
opt.textContent=c[0];
vehicule.appendChild(opt);
});

// AUTO INFOS
function remplirInfos(){
let c=camions.find(x=>x[0]===vehicule.value);
if(c){
marque.value=c[1];
type.value=c[2];
}
}

// ENVOI
function envoyer(){

let url = URL+"?action=add"
+"&mecanicien="+encodeURIComponent(mecanicien.value)
+"&vehicule="+encodeURIComponent(vehicule.value)
+"&marque="+encodeURIComponent(marque.value)
+"&type="+encodeURIComponent(type.value)
+"&panne="+encodeURIComponent(panne.value)
+"&description="
+"&duree="+encodeURIComponent(duree.value)
+"&priorite="+priorite.value
+"&pieces="
+"&cout=0"
+"&statut="+statut.value;

fetch(url).then(()=>{
alert("✅ Envoyé !");
loadData();
});

}

// LOAD DATA
function loadData(){

fetch(URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let html="", hist="";
let enCours=0, termine=0;

for(let i=1;i<data.length;i++){

html+=`
<tr>
<td>${data[i][2]}</td>
<td>${data[i][1]}</td>
<td>${data[i][5]}</td>
<td>${data[i][11]}</td>
</tr>`;

hist+=`
<div class="card">
${data[i][2]} - ${data[i][1]}<br>
${data[i][5]} (${data[i][8]}) - ${data[i][7]}h
</div>`;

if(data[i][11]=="En cours") enCours++;
if(data[i][11]=="Terminé") termine++;
}

tableData.innerHTML=html;
historyData.innerHTML=hist;

// GRAPH
new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:["En cours","Terminé"],
datasets:[{data:[enCours,termine]}]
}
});

});
}

// INIT
loadData();

</script>

</body>
</html>
