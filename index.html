<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FleetTrack PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;margin:0;background:#f3f4f6;}

header {
background:#0f172a;color:white;
padding:15px;display:flex;justify-content:space-between;
}

nav button {
margin:5px;padding:10px;border:none;
background:#1e293b;color:white;border-radius:5px;
cursor:pointer;
}

.container {padding:20px;}

.card {
background:white;padding:15px;
margin:10px 0;border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.hidden {display:none;}

input,select {
width:100%;padding:8px;margin:5px 0;
}

button.send {
background:green;color:white;padding:10px;width:100%;
}

.kpi {
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.kpi div {
background:white;padding:15px;border-radius:10px;
text-align:center;font-weight:bold;
}

table {
width:100%;border-collapse:collapse;
}

th, td {
padding:8px;border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<h2>FleetTrack</h2>

<nav>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('form')">Formulaire</button>
<button onclick="showPage('history')">Historique</button>
</nav>
</header>

<div class="container">

<div id="dashboard">
<h3>Vue d'ensemble</h3>

<div class="kpi">
<div id="kpiTotal">0<br>Total</div>
<div id="kpiUrgent">0<br>Urgent</div>
<div id="kpiTermine">0<br>Terminé</div>
<div id="kpiHeures">0h<br>Heures</div>
</div>

<div class="card">
<h3>Réparations récentes</h3>
<table>
<thead>
<tr>
<th>Camion</th>
<th>Mécano</th>
<th>Panne</th>
<th>Statut</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

<div class="card">
<h3>Statut interventions</h3>
<canvas id="chart"></canvas>
</div>

</div>

<div id="form" class="hidden">FORMULAIRE</div>
<div id="history" class="hidden"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzVRukMQQ0Avv8H2apxs9qjGt7ZmTAavyTw9f63AMudBqG2X0QywCQk1B5oSUZSZ8f0nQ/exec";

function showPage(p){
document.getElementById("dashboard").style.display="none";
document.getElementById("form").style.display="none";
document.getElementById("history").style.display="none";

document.getElementById(p).style.display="block";
}

function loadData(){

fetch(URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let html="";
let total=0, urgent=0, termine=0, heures=0;

for(let i=1;i<data.length;i++){

html+=`<tr>
<td>${data[i][2]}</td>
<td>${data[i][1]}</td>
<td>${data[i][5]}</td>
<td>${data[i][11]}</td>
</tr>`;

total++;
if(data[i][8]=="Urgente") urgent++;
if(data[i][11]=="Terminé") termine++;
heures+=Number(data[i][7])||0;
}

tableData.innerHTML=html;

kpiTotal.innerHTML=total+"<br>Total";
kpiUrgent.innerHTML=urgent+"<br>Urgent";
kpiTermine.innerHTML=termine+"<br>Terminé";
kpiHeures.innerHTML=heures+"h<br>Heures";

new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:["En cours","Terminé"],
datasets:[{data:[total-termine,termine]}]
}
});

// GRAPH CAMIONS
let statsCamion = {};

for(let i=1;i<data.length;i++){
let camion = data[i][2];
if(!statsCamion[camion]) statsCamion[camion]=0;
statsCamion[camion]++;
}

// création canvas dynamique si pas existant
if(!document.getElementById("chartCamion")){
let canvas = document.createElement("canvas");
canvas.id = "chartCamion";
document.querySelector("#dashboard").appendChild(canvas);
}

new Chart(document.getElementById("chartCamion"),{
type:'bar',
data:{
labels:Object.keys(statsCamion),
datasets:[{
label:"Réparations par camion",
data:Object.values(statsCamion)
}]
}
});

});
}

loadData();

</script>

</body>
</html>
